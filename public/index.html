<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="NPM 包周下载量追踪与对比工具">
  <title>NPM Weekly Downloads</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>%F0%9F%93%8A</text></svg>">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>NPM Weekly Downloads</h1>
      <p class="subtitle" id="lastUpdated">loading...</p>
    </header>

    <div class="toolbar">
      <div class="add-package">
        <input type="text" id="packageInput" placeholder="npm package name, e.g. react or @scope/package">
        <button id="addBtn" onclick="addPackage()">Add</button>
      </div>
      <div class="actions">
        <button class="btn-refresh" onclick="refreshData()">Refresh</button>
        <button class="btn-download" onclick="downloadCSV()">Download CSV</button>
      </div>
    </div>

    <div class="package-tags" id="packageTags"></div>

    <div class="table-wrapper" id="tableWrapper" style="display:none;">
      <table id="dataTable">
        <thead><tr id="tableHeader"></tr></thead>
        <tbody id="tableBody"></tbody>
        <tfoot><tr id="tableFoot"></tr></tfoot>
      </table>
    </div>

    <div class="empty-state" id="emptyState" style="display:none;">
      <p id="emptyText">loading...</p>
    </div>
  </div>

  <div class="loading-overlay" id="loadingOverlay" style="display:none;">
    <div class="spinner"></div>
    <p id="loadingText">loading...</p>
  </div>

  <div class="toast" id="toast"></div>

  <script src="/script.js"></script>
</body>
</html>
